<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
body { background: #fff; padding: 16px; }
.row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #bbb; margin-bottom: 6px; }
</style></head><body>
<div class="label">Role Badges</div>
<div class="row">
  <span style="background:#e8eef8;color:#1a6fc4;padding:2px 8px;border-radius:4px;font-size:0.82rem;font-weight:600">ATT</span>
  <span style="background:#e8eef8;color:#1a6fc4;padding:2px 8px;border-radius:4px;font-size:0.82rem;font-weight:600">CEN</span>
  <span style="background:#e8eef8;color:#1a6fc4;padding:2px 8px;border-radius:4px;font-size:0.82rem;font-weight:600">DIF</span>
  <span style="background:#e8eef8;color:#1a6fc4;padding:2px 8px;border-radius:4px;font-size:0.82rem;font-weight:600">POR</span>
</div>
<div class="label">Status Tags</div>
<div class="row">
  <span style="color:#27ae60;font-weight:700;font-size:0.82rem">✅ rinnovato</span>
  <span style="color:#e05050;font-weight:700;font-size:0.82rem">👋 in uscita</span>
  <span style="color:#8e44ad;font-weight:700;font-size:0.82rem">🎓 si ritira</span>
  <span style="color:#1a6fc4;font-weight:700;font-size:0.82rem">📝 pre-contratto</span>
  <span style="color:#e05050;font-size:0.82rem">⚠️ scad.</span>
</div>
<div class="label">Probability Labels</div>
<div class="row">
  <span style="color:#2ecc71;font-weight:700;font-size:0.82rem">● Alta</span>
  <span style="color:#f39c12;font-weight:700;font-size:0.82rem">● Media</span>
  <span style="color:#e74c3c;font-weight:700;font-size:0.82rem">● Bassa</span>
</div>
<div class="label">Info Chips / Coppa Winner</div>
<div class="row">
  <span style="display:inline-block;background:gold;padding:4px 12px;border-radius:4px;font-weight:700;font-size:0.88rem">🏆 Inter</span>
  <span style="background:#1a4a8a;color:#fff;padding:6px 14px;border-radius:20px;font-size:0.82rem;box-shadow:0 2px 8px rgba(0,0,0,.2)">⚽ Milan</span>
  <span style="background:#e8eef8;color:#1a6fc4;padding:1px 7px;border-radius:4px;font-size:0.78rem;font-weight:600">ATT</span>
  <span style="background:#e74c3c;color:#fff;border-radius:3px;padding:1px 4px;font-size:0.7rem;font-weight:700">SQUALIFICATO</span>
  <span style="background:#e8f4ec;color:#1a8a45;padding:2px 8px;border-radius:4px;font-size:0.78rem;font-weight:600">Svincolato</span>
</div>
<div class="label">Notification Badge</div>
<div class="row">
  <span style="font-size:0.88rem;color:#555">Rinnovi</span>
  <span style="display:inline-block;background:#e05050;color:#fff;border-radius:10px;font-size:.72rem;padding:0 6px">3</span>
  &nbsp;&nbsp;
  <span style="font-size:0.88rem;color:#555">Offerte</span>
  <span style="display:inline-block;background:#e05050;color:#fff;border-radius:10px;font-size:.72rem;padding:0 6px">1</span>
</div>
<div class="label">Strength / OVR Badge</div>
<div class="row">
  <span style="background:#556;color:#fff;border-radius:3px;padding:1px 5px;font-size:0.72rem;font-weight:700">78</span>
  <span style="background:#556;color:#fff;border-radius:3px;padding:1px 5px;font-size:0.72rem;font-weight:700">65</span>
  <span style="background:#556;color:#fff;border-radius:3px;padding:1px 5px;font-size:0.72rem;font-weight:700">91</span>
  <span style="font-size:0.88rem;color:#555">⚡ Forza</span>
</div>
</body></html>
