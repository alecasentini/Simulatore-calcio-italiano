<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
body { background: #f5f5f5; padding: 16px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
.swatch { background: #fff; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; height: 44px; }
.label { font-size: 10px; color: #888; text-align: center; margin-top: 4px; }
.name { font-size: 11px; font-weight: 700; color: #333; text-align: center; }
.shadow-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.shadow-box { background: #fff; height: 44px; border-radius: 8px; }
</style></head><body>
<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#bbb;margin-bottom:8px">Border Radius</div>
<div class="grid">
  <div><div class="swatch" style="border-radius:4px;border:2px solid #007bff">sm</div><div class="name">4px</div><div class="label">score pill, badge</div></div>
  <div><div class="swatch" style="border-radius:5px;border:2px solid #007bff">md</div><div class="name">5px</div><div class="label">buttons, chips</div></div>
  <div><div class="swatch" style="border-radius:6px;border:2px solid #007bff">lg</div><div class="name">6px</div><div class="label">row cards</div></div>
  <div><div class="swatch" style="border-radius:8px;border:2px solid #007bff">xl</div><div class="name">8px</div><div class="label">match highlight</div></div>
  <div><div class="swatch" style="border-radius:10px;border:2px solid #007bff">2xl</div><div class="name">10px</div><div class="label">player card</div></div>
  <div><div class="swatch" style="border-radius:12px;border:2px solid #007bff">3xl</div><div class="name">12px</div><div class="label">large modals</div></div>
  <div><div class="swatch" style="border-radius:20px;border:2px solid #007bff">pill</div><div class="name">20px</div><div class="label">badge pill</div></div>
  <div><div class="swatch" style="border-radius:50%;border:2px solid #007bff;width:44px;justify-self:center">●</div><div class="name">jersey dot</div><div class="label">team color dot</div></div>
</div>
<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#bbb;margin-bottom:8px;margin-top:4px">Shadows</div>
<div class="shadow-row">
  <div><div class="shadow-box" style="box-shadow:0 4px 6px rgba(0,0,0,.1)"></div><div class="name" style="font-size:10px;margin-top:4px">btn</div><div class="label">0 4px 6px .10</div></div>
  <div><div class="shadow-box" style="box-shadow:0 5px 15px rgba(0,0,0,.3)"></div><div class="name" style="font-size:10px;margin-top:4px">modal</div><div class="label">0 5px 15px .30</div></div>
  <div><div class="shadow-box" style="box-shadow:0 8px 32px rgba(0,0,0,.25)"></div><div class="name" style="font-size:10px;margin-top:4px">card</div><div class="label">0 8px 32px .25</div></div>
  <div><div class="shadow-box" style="box-shadow:0 12px 40px rgba(0,0,0,.35)"></div><div class="name" style="font-size:10px;margin-top:4px">heavy</div><div class="label">0 12px 40px .35</div></div>
</div>
</body></html>
