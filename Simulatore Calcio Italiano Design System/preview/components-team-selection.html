<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
body { background: #0d1b2a; padding: 16px; }
.col { min-width: 160px; }
h2 { color: #f0c040; font-size: 0.85rem; text-transform: uppercase; letter-spacing: .08em; margin: 0 0 8px; text-align: center; }
.btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 9px 12px; margin-bottom: 5px;
  background: #1a2e45; border: 1px solid #2a4060; border-radius: 7px;
  color: #dce8f5; font-size: 0.88rem; cursor: pointer; text-align: left; }
.btn:hover { background: #1e4070; border-color: #5599ee; }
.jersey { width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0; }
.leagues { display: flex; gap: 16px; }
.page-title { color: #fff; font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
.page-sub { color: #8ab; font-size: 0.9rem; margin-bottom: 16px; }
</style></head><body>
<div class="page-title">Simulatore Calcio Italiano</div>
<div class="page-sub">Scegli la tua squadra o gioca come spettatore</div>
<div class="leagues">
  <div class="col">
    <h2>Serie A</h2>
    <div class="btn"><div class="jersey" style="background:#fff;border:1px solid #000"></div>Juventus</div>
    <div class="btn"><div class="jersey" style="background:#0055A4"></div>Inter</div>
    <div class="btn"><div class="jersey" style="background:#AC0D0D"></div>Milan</div>
    <div class="btn"><div class="jersey" style="background:#8A1E12"></div>Roma</div>
    <div class="btn"><div class="jersey" style="background:#87CEEB"></div>Napoli</div>
  </div>
  <div class="col">
    <h2>Serie B</h2>
    <div class="btn"><div class="jersey" style="background:#005CB9"></div>Empoli</div>
    <div class="btn"><div class="jersey" style="background:#7A1429"></div>Salernitana</div>
    <div class="btn"><div class="jersey" style="background:#FFD700"></div>Lecce</div>
    <div class="btn"><div class="jersey" style="background:#FC4C02"></div>Venezia</div>
  </div>
  <div class="col">
    <h2>Serie C</h2>
    <div class="btn"><div class="jersey" style="background:#006837"></div>Avellino</div>
    <div class="btn"><div class="jersey" style="background:#FFD700"></div>Benevento</div>
    <div class="btn"><div class="jersey" style="background:#DA291C"></div>Catania</div>
    <div class="btn"><div class="jersey" style="background:#E30613"></div>Ternana</div>
  </div>
</div>
</body></html>
