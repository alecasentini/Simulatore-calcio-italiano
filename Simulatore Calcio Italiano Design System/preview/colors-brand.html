<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
body { background: #fff; padding: 16px; }
.grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
.swatch { border-radius: 6px; overflow: hidden; }
.color { height: 52px; }
.label { font-size: 11px; color: #555; padding: 5px 6px; line-height: 1.4; }
.name { font-weight: 700; font-size: 11px; }
.hex { color: #888; font-size: 10px; }
</style></head><body>
<div class="grid">
  <div class="swatch"><div class="color" style="background:#007bff"></div><div class="label"><div class="name">Primary</div><div class="hex">#007bff</div></div></div>
  <div class="swatch"><div class="color" style="background:#0056b3"></div><div class="label"><div class="name">Primary Hover</div><div class="hex">#0056b3</div></div></div>
  <div class="swatch"><div class="color" style="background:#1a6fc4"></div><div class="label"><div class="name">Link</div><div class="hex">#1a6fc4</div></div></div>
  <div class="swatch"><div class="color" style="background:#1a4a8a"></div><div class="label"><div class="name">Confirm</div><div class="hex">#1a4a8a</div></div></div>
  <div class="swatch"><div class="color" style="background:#0d1b2a"></div><div class="label"><div class="name">Navy</div><div class="hex">#0d1b2a</div></div></div>
  <div class="swatch"><div class="color" style="background:#e8f2ff"></div><div class="label"><div class="name">Primary Light</div><div class="hex">#e8f2ff</div></div></div>
</div>
</body></html>
