<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
body { background: #fff; padding: 16px; }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
th { background: #f2f2f2; font-size: 0.78rem; color: #555; font-weight: 600; }
.team-cell { display: flex; align-items: center; gap: 8px; text-align: left; }
.jersey { display: inline-block; width: 14px; height: 14px; border: 1px solid #555; border-radius: 3px; flex-shrink: 0; }
.promotion-zone { background: #d4edda; }
.relegation-zone { background: #f8d7da; }
.my-team { background: #e8f2ff !important; font-weight: 600; }
.clickable { cursor: pointer; color: #1a6fc4; text-decoration: underline; font-weight: 700; }
</style></head><body>
<table>
  <thead>

  </thead>
  <tbody>
    <tr class="promotion-zone"><td>1</td><td><div class="team-cell"><span class="jersey" style="background:#fff;border-color:#000"></span><span class="clickable">Juventus</span></div></td><td><strong>72</strong></td><td>34</td><td>22</td><td>6</td><td>6</td><td>68</td><td>28</td><td>+40</td></tr>

    <tr><td>4</td><td><div class="team-cell"><span class="jersey" style="background:#8A1E12"></span><span class="clickable">Roma</span></div></td><td><strong>58</strong></td><td>34</td><td>16</td><td>10</td><td>8</td><td>48</td><td>36</td><td>+12</td></tr>
    <tr><td>5</td><td><div class="team-cell"><span class="jersey" style="background:#87CEEB"></span><span class="clickable">Napoli</span></div></td><td><strong>55</strong></td><td>34</td><td>15</td><td>10</td><td>9</td><td>52</td><td>40</td><td>+12</td></tr>

  </tbody>
</table>
</body></html>
