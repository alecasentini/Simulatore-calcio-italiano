<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magliette Squadre</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #f5f5f5; padding: 20px; }
h2 { font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #f0c040; background: #0d1b2a; padding: 6px 12px; border-radius: 4px; display: inline-block; margin: 18px 0 10px; }
h2:first-child { margin-top: 0; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-bottom: 4px; }
.team { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.team-name { font-size: .68rem; color: #555; text-align: center; line-height: 1.2; }
</style>
</head>
<body>
<script>
// Jersey SVG path (44×48 viewbox) - football shirt silhouette
// d = the jersey outline path
const JERSEY_PATH = "M20,2 C17,1 15,3 15,5 L5,9 L1,21 L1,27 L10,25 L10,47 L34,47 L34,25 L43,27 L43,21 L39,9 L29,5 C29,3 27,1 24,2 Q22,3 20,2 Z";
const COLLAR_PATH = "M15,5 Q20,9 29,5";

const teams = {
  'Serie A': [
    { name:'Juventus',      c1:'#ffffff', c2:'#000000', pattern:'vstripes' },
    { name:'Inter',         c1:'#0055A4', c2:'#000000', pattern:'vstripes' },
    { name:'Milan',         c1:'#AC0D0D', c2:'#000000', pattern:'vstripes' },
    { name:'Roma',          c1:'#8A1E12', c2:'#000000', pattern:'solid'    },
    { name:'Napoli',        c1:'#6CB4E4', c2:'#6CB4E4', pattern:'solid'    },
    { name:'Lazio',         c1:'#87CEEB', c2:'#001E5E', pattern:'solid'    },
    { name:'Atalanta',      c1:'#0055A4', c2:'#000000', pattern:'vstripes' },
    { name:'Fiorentina',    c1:'#482E80', c2:'#ffffff', pattern:'solid'    },
    { name:'Sampdoria',     c1:'#003282', c2:'#003282', pattern:'sash'     },
    { name:'Genoa',         c1:'#D2232A', c2:'#001F49', pattern:'hstripes' },
    { name:'Udinese',       c1:'#ffffff', c2:'#000000', pattern:'vstripes' },
    { name:'Bologna',       c1:'#9f142d', c2:'#1b2f56', pattern:'vstripes' },
    { name:'Sassuolo',      c1:'#000000', c2:'#008E55', pattern:'vstripes' },
    { name:'Cagliari',      c1:'#c0001a', c2:'#002b5c', pattern:'solid'    },
    { name:'Torino',        c1:'#8a1e2a', c2:'#ffffff', pattern:'solid'    },
    { name:'Parma',         c1:'#FFF300', c2:'#001A72', pattern:'solid'    },
    { name:'Hellas Verona', c1:'#002D62', c2:'#FFD700', pattern:'half'     },
    { name:'Palermo',       c1:'#FF1493', c2:'#000000', pattern:'half'     },
    { name:'Bari',          c1:'#ffffff', c2:'#ED1C24', pattern:'solid'    },
    { name:'Vicenza',       c1:'#ffffff', c2:'#E30613', pattern:'vstripes' },
  ],
  'Serie B': [
    { name:'Empoli',        c1:'#005CB9', c2:'#ffffff', pattern:'solid'    },
    { name:'Salernitana',   c1:'#7A1429', c2:'#000000', pattern:'solid'    },
    { name:'Lecce',         c1:'#FFD700', c2:'#DA291C', pattern:'vstripes' },
    { name:'Venezia',       c1:'#FC4C02', c2:'#000000', pattern:'solid'    },
    { name:'Cittadella',    c1:'#AF002D', c2:'#ffffff', pattern:'solid'    },
    { name:'Monza',         c1:'#E30613', c2:'#ffffff', pattern:'vstripes' },
    { name:'Pisa',          c1:'#000000', c2:'#5594D0', pattern:'solid'    },
    { name:'Chievo',        c1:'#FFD700', c2:'#005CB9', pattern:'half'     },
    { name:'Ascoli',        c1:'#000000', c2:'#ffffff', pattern:'half'     },
    { name:'Brescia',       c1:'#003087', c2:'#ffffff', pattern:'solid'    },
    { name:'Varese',        c1:'#ffffff', c2:'#E30613', pattern:'hstripes' },
    { name:'Cremonese',     c1:'#aaaaaa', c2:'#E30613', pattern:'vstripes' },
    { name:'SPAL',          c1:'#005CB9', c2:'#ffffff', pattern:'vstripes' },
    { name:'Reggina',       c1:'#800000', c2:'#000000', pattern:'solid'    },
    { name:'Triestina',     c1:'#E30613', c2:'#ffffff', pattern:'solid'    },
    { name:'Cosenza',       c1:'#D71920', c2:'#002D62', pattern:'half'     },
    { name:'Entella',       c1:'#005CB9', c2:'#ffffff', pattern:'vstripes' },
    { name:'Reggiana',      c1:'#AC0D0D', c2:'#000000', pattern:'solid'    },
    { name:'Frosinone',     c1:'#FFD700', c2:'#005CB9', pattern:'half'     },
    { name:'Como',          c1:'#002D62', c2:'#ffffff', pattern:'solid'    },
  ],
  'Serie C': [
    { name:'Avellino',      c1:'#006837', c2:'#ffffff', pattern:'solid'    },
    { name:'Benevento',     c1:'#DA291C', c2:'#FFD700', pattern:'hstripes' },
    { name:'Catania',       c1:'#DA291C', c2:'#005CB9', pattern:'half'     },
    { name:'Ternana',       c1:'#E30613', c2:'#008000', pattern:'hstripes' },
    { name:'Lecco',         c1:'#002D62', c2:'#87CEEB', pattern:'solid'    },
    { name:'Padova',        c1:'#ffffff', c2:'#E30613', pattern:'vstripes' },
    { name:'Cesena',        c1:'#000000', c2:'#ffffff', pattern:'vstripes' },
    { name:'Modena',        c1:'#FFD700', c2:'#003087', pattern:'solid'    },
    { name:'Perugia',       c1:'#E30613', c2:'#ffffff', pattern:'solid'    },
    { name:'Alessandria',   c1:'#808080', c2:'#000000', pattern:'solid'    },
    { name:'Novara',        c1:'#005CB9', c2:'#ffffff', pattern:'solid'    },
    { name:'Catanzaro',     c1:'#FFD700', c2:'#DA291C', pattern:'solid'    },
    { name:'Siena',         c1:'#000000', c2:'#007A33', pattern:'half'     },
    { name:'Foggia',        c1:'#DA291C', c2:'#000000', pattern:'solid'    },
    { name:'Pro Patria',    c1:'#ffffff', c2:'#002D62', pattern:'solid'    },
    { name:'Piacenza',      c1:'#E30613', c2:'#ffffff', pattern:'solid'    },
    { name:'Lucchese',      c1:'#DA291C', c2:'#000000', pattern:'solid'    },
    { name:'Livorno',       c1:'#800000', c2:'#FFD700', pattern:'sash'     },
    { name:'Pescara',       c1:'#87CEEB', c2:'#000000', pattern:'solid'    },
    { name:'Messina',       c1:'#FFD700', c2:'#DA291C', pattern:'half'     },
  ]
};

function makeJerseySVG(t) {
  const id = t.name.replace(/[^a-zA-Z]/g,'_') + '_' + Math.random().toString(36).slice(2,6);
  let patternDef = '', fillRef = t.c1;

  if (t.pattern === 'vstripes') {
    patternDef = `<pattern id="${id}" x="0" y="0" width="8" height="48" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="4" height="48" fill="${t.c1}"/><rect x="4" y="0" width="4" height="48" fill="${t.c2}"/>
    </pattern>`;
    fillRef = `url(#${id})`;
  } else if (t.pattern === 'hstripes') {
    patternDef = `<pattern id="${id}" x="0" y="0" width="44" height="8" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="44" height="4" fill="${t.c1}"/><rect x="0" y="4" width="44" height="4" fill="${t.c2}"/>
    </pattern>`;
    fillRef = `url(#${id})`;
  } else if (t.pattern === 'half') {
    patternDef = `<linearGradient id="${id}" x1="0" y1="0" x2="1" y2="0">
      <stop offset="50%" stop-color="${t.c1}"/><stop offset="50%" stop-color="${t.c2}"/>
    </linearGradient>`;
    fillRef = `url(#${id})`;
  } else if (t.pattern === 'sash') {
    patternDef = `<linearGradient id="${id}" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="30%" stop-color="${t.c1}"/><stop offset="30%" stop-color="${t.c2}"/>
      <stop offset="70%" stop-color="${t.c2}"/><stop offset="70%" stop-color="${t.c1}"/>
    </linearGradient>`;
    fillRef = `url(#${id})`;
  }

  const lum = (hex) => { try { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return (r*299+g*587+b*114)/1000; } catch(e){return 128;} };
  const strokeColor = lum(t.c1)>160 && lum(t.c2)>160 ? '#aaa' : '#fff';
  const shortsStroke = lum(t.c2)>160 ? '#aaa' : '#fff';

  return `<svg viewBox="0 0 44 70" width="50" height="80" xmlns="http://www.w3.org/2000/svg">
    <defs>${patternDef}</defs>
    <!-- Shadow jersey -->
    <path d="M20,3 C17,2 15,4 15,6 L5,10 L1,22 L1,28 L10,26 L10,47 L34,47 L34,26 L43,28 L43,22 L39,10 L29,6 C29,4 27,2 24,3 Q22,4 20,3 Z" fill="rgba(0,0,0,0.13)" transform="translate(1,2)"/>
    <!-- Jersey body -->
    <path d="M20,2 C17,1 15,3 15,5 L5,9 L1,21 L1,27 L10,25 L10,47 L34,47 L34,25 L43,27 L43,21 L39,9 L29,5 C29,3 27,1 24,2 Q22,3 20,2 Z" fill="${fillRef}" stroke="${strokeColor}" stroke-width="1"/>
    <!-- Sleeve seams -->
    <line x1="10" y1="25" x2="10" y2="10" stroke="rgba(0,0,0,0.10)" stroke-width=".8"/>
    <line x1="34" y1="25" x2="34" y2="10" stroke="rgba(0,0,0,0.10)" stroke-width=".8"/>
    <!-- Collar -->
    <path d="M15,5 Q20,10 29,5" fill="none" stroke="${strokeColor}" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Shadow shorts -->
    <path d="M11,49 L11,68 L21,68 Q22,58 23,68 L33,68 L33,49 Z" fill="rgba(0,0,0,0.13)" transform="translate(1,2)"/>
    <!-- Shorts -->
    <path d="M11,48 L11,67 L21,67 Q22,57 23,67 L33,67 L33,48 Z" fill="${t.c2}" stroke="${shortsStroke}" stroke-width="1" stroke-linejoin="round"/>
    <!-- Waistband -->
    <line x1="11" y1="51" x2="33" y2="51" stroke="rgba(0,0,0,0.10)" stroke-width="1"/>
  </svg>`;
}

// Render
const container = document.body;

Object.entries(teams).forEach(([league, list]) => {
  const h2 = document.createElement('h2');
  h2.textContent = league;
  container.appendChild(h2);

  const grid = document.createElement('div');
  grid.className = 'grid';

  list.forEach(t => {
    const div = document.createElement('div');
    div.className = 'team';
    div.innerHTML = makeJerseySVG(t) + `<span class="team-name">${t.name}</span>`;
    grid.appendChild(div);
  });

  container.appendChild(grid);
});
</script>
</body>
</html>
