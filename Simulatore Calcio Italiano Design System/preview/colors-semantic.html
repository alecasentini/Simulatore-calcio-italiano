<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
body { background: #fff; padding: 16px; }
.grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
.swatch { border-radius: 6px; overflow: hidden; }
.color { height: 52px; }
.label { font-size: 11px; color: #555; padding: 5px 6px; line-height: 1.4; }
.name { font-weight: 700; font-size: 11px; }
.hex { color: #888; font-size: 10px; }
</style></head><body>
<div class="grid">
  <div class="swatch"><div class="color" style="background:#2ecc71"></div><div class="label"><div class="name">Success</div><div class="hex">#2ecc71</div></div></div>
  <div class="swatch"><div class="color" style="background:#27ae60"></div><div class="label"><div class="name">Success Dark</div><div class="hex">#27ae60</div></div></div>
  <div class="swatch"><div class="color" style="background:#e74c3c"></div><div class="label"><div class="name">Danger</div><div class="hex">#e74c3c</div></div></div>
  <div class="swatch"><div class="color" style="background:#c0392b"></div><div class="label"><div class="name">Danger Dark</div><div class="hex">#c0392b</div></div></div>
  <div class="swatch"><div class="color" style="background:#f39c12"></div><div class="label"><div class="name">Warning</div><div class="hex">#f39c12</div></div></div>
  <div class="swatch"><div class="color" style="background:#f0c040"></div><div class="label"><div class="name">Gold</div><div class="hex">#f0c040</div></div></div>
  <div class="swatch"><div class="color" style="background:#6c757d"></div><div class="label"><div class="name">Secondary</div><div class="hex">#6c757d</div></div></div>
  <div class="swatch"><div class="color" style="background:#545b62"></div><div class="label"><div class="name">Secondary Hover</div><div class="hex">#545b62</div></div></div>
  <div class="swatch"><div class="color" style="background:#e05050"></div><div class="label"><div class="name">Badge Red</div><div class="hex">#e05050</div></div></div>
  <div class="swatch"><div class="color" style="background:#4a7fcb"></div><div class="label"><div class="name">Personality Bar</div><div class="hex">#4a7fcb</div></div></div>
  <div class="swatch"><div class="color" style="background:#8a1e2a"></div><div class="label"><div class="name">Torino Red</div><div class="hex">#8a1e2a</div></div></div>
  <div class="swatch"><div class="color" style="background:#482e80"></div><div class="label"><div class="name">Fiorentina</div><div class="hex">#482e80</div></div></div>
</div>
</body></html>
