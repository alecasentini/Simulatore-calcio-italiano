<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
body { background: #fff; padding: 16px; }
.grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
.swatch { border-radius: 6px; overflow: hidden; border: 1px solid #e8e8e8; }
.color { height: 52px; }
.label { font-size: 11px; color: #555; padding: 5px 6px; line-height: 1.4; background: #fff; }
.name { font-weight: 700; font-size: 11px; }
.hex { color: #888; font-size: 10px; }
</style></head><body>
<div class="grid">
  <div class="swatch"><div class="color" style="background:#ffffff"></div><div class="label"><div class="name">Default</div><div class="hex">#ffffff</div></div></div>
  <div class="swatch"><div class="color" style="background:#f7f9fc"></div><div class="label"><div class="name">Subtle</div><div class="hex">#f7f9fc</div></div></div>
  <div class="swatch"><div class="color" style="background:#f4f6fa"></div><div class="label"><div class="name">Subtle Alt</div><div class="hex">#f4f6fa</div></div></div>
  <div class="swatch"><div class="color" style="background:#f0f4ff"></div><div class="label"><div class="name">Row Hover</div><div class="hex">#f0f4ff</div></div></div>
  <div class="swatch"><div class="color" style="background:#eeeeee"></div><div class="label"><div class="name">Summary BG</div><div class="hex">#eeeeee</div></div></div>
  <div class="swatch"><div class="color" style="background:#f0f7ff"></div><div class="label"><div class="name">Highlight</div><div class="hex">#f0f7ff</div></div></div>
  <div class="swatch"><div class="color" style="background:#d4edda"></div><div class="label"><div class="name">Promotion</div><div class="hex">#d4edda</div></div></div>
  <div class="swatch"><div class="color" style="background:#f8d7da"></div><div class="label"><div class="name">Relegation</div><div class="hex">#f8d7da</div></div></div>
  <div class="swatch"><div class="color" style="background:#e8f2ff"></div><div class="label"><div class="name">My Team</div><div class="hex">#e8f2ff</div></div></div>
  <div class="swatch"><div class="color" style="background:#fff8e1"></div><div class="label"><div class="name">Scouting</div><div class="hex">#fff8e1</div></div></div>
  <div class="swatch"><div class="color" style="background:#eef7ff"></div><div class="label"><div class="name">Info Banner</div><div class="hex">#eef7ff</div></div></div>
  <div class="swatch"><div class="color" style="background:#e3f2fd"></div><div class="label"><div class="name">Precontract</div><div class="hex">#e3f2fd</div></div></div>
</div>
</body></html>
