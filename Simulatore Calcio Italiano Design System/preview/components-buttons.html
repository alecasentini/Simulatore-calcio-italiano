<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
body { background: #fff; padding: 16px; }
.row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
.label { font-size: 10px; color: #bbb; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
button { border: none; cursor: pointer; }
</style></head><body>
<div class="label">Primary Actions</div>
<div class="row">
  <button style="padding:10px 20px;font-size:1.2rem;background:#007bff;color:#fff;border-radius:5px;box-shadow:0 4px 6px rgba(0,0,0,.1)">Inizia Stagione</button>
  <button style="padding:8px 16px;font-size:0.9rem;background:#6c757d;color:#fff;border-radius:5px;box-shadow:0 4px 6px rgba(0,0,0,.1)">Simula Tutto ▶▶</button>
  <button style="padding:9px 20px;background:#1a4a8a;color:#fff;border-radius:7px;font-size:0.92rem;font-weight:700">Conferma Mercato</button>
</div>
<div class="label">Action Buttons</div>
<div class="row">
  <button style="padding:5px 12px;background:#2ecc71;color:#fff;border-radius:5px;font-size:0.82rem;font-weight:600">Rinnova</button>
  <button style="padding:5px 12px;background:#e74c3c;color:#fff;border-radius:5px;font-size:0.82rem;font-weight:600">Svincola</button>
  <button style="padding:5px 12px;background:#2980b9;color:#fff;border-radius:5px;font-size:0.82rem;font-weight:600">Acquista</button>
  <button style="padding:5px 12px;background:#2ecc71;color:#fff;border-radius:5px;font-size:0.82rem;font-weight:600;opacity:.45;cursor:default">Disabilitato</button>
</div>
<div class="label">Tab Buttons</div>
<div class="row" style="border-bottom:2px solid #dde2ec;padding-bottom:0;gap:0">
  <button style="flex:1;padding:10px 8px;border:none;background:#f7f9fc;font-size:0.88rem;color:#1a4a8a;border-bottom:3px solid #1a4a8a;font-weight:700;margin-bottom:-2px">Rinnovi <span style="background:#e05050;color:#fff;border-radius:10px;font-size:.72rem;padding:0 6px;margin-left:4px">3</span></button>
  <button style="flex:1;padding:10px 8px;border:none;background:#f7f9fc;font-size:0.88rem;color:#555;border-bottom:3px solid transparent;margin-bottom:-2px">Offerte</button>
  <button style="flex:1;padding:10px 8px;border:none;background:#f7f9fc;font-size:0.88rem;color:#555;border-bottom:3px solid transparent;margin-bottom:-2px">Rosa</button>
  <button style="flex:1;padding:10px 8px;border:none;background:#f7f9fc;font-size:0.88rem;color:#555;border-bottom:3px solid transparent;margin-bottom:-2px">Acquisti</button>
</div>
<div style="height:10px"></div>
<div class="label">Database Tab Buttons</div>
<div class="row">
  <button style="padding:6px 16px;border:1px solid #007bff;border-radius:4px;background:#007bff;color:#fff;font-size:0.9rem">Giocatori</button>
  <button style="padding:6px 16px;border:1px solid #ccc;border-radius:4px;background:#f5f5f5;font-size:0.9rem">Allenatori</button>
  <button style="padding:6px 16px;border:1px solid #ccc;border-radius:4px;background:#f5f5f5;font-size:0.9rem">DS</button>
</div>
</body></html>
