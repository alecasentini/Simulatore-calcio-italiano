<meta charset="UTF-8">
<title>Mockup — ritratto che sfonda l'angolo della scheda giocatore</title>
<style>
  body {
    margin: 0;
    padding: 48px;
    background: #1a1f2c;
    display: flex;
    gap: 64px;
    flex-wrap: wrap;
    align-items: flex-start;
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
  }

  .variant {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .variant-label {
    color: #f0a013;
    font-size: .8rem;
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .card-wrap {
    position: relative;
    width: 620px;
  }

  .card-wrap img.card-bg {
    display: block;
    width: 100%;
    height: auto;
  }

  /* ── Variante A: badge dritto, stile HUD/arcade ── */
  .portrait-a {
    position: absolute;
    top: -22px;
    left: -22px;
    width: 108px;
    height: 108px;
    border: 3px solid #0d1420;
    background: #0d1420;
    box-shadow: 5px 5px 0 rgba(0, 0, 0, .45);
    z-index: 5;
  }

  .portrait-a img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    image-rendering: pixelated;
    display: block;
  }

  /* piccola tacca dorata in stile HUD, angolo taglio in alto a sinistra */
  .portrait-a::before {
    content: '';
    position: absolute;
    top: -3px;
    left: -3px;
    width: 16px;
    height: 16px;
    background: #f0a013;
    clip-path: polygon(0 0, 100% 0, 0 100%);
  }

  /* ── Variante B: card ruotata stile "figurina" ── */
  .portrait-b {
    position: absolute;
    top: -28px;
    left: -30px;
    width: 112px;
    height: 112px;
    border: 3px solid #0d1420;
    background: #0d1420;
    box-shadow: 5px 5px 0 rgba(0, 0, 0, .45);
    transform: rotate(-7deg);
    z-index: 5;
  }

  .portrait-b img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    image-rendering: pixelated;
    display: block;
  }

  .portrait-b::after {
    content: '';
    position: absolute;
    inset: -3px;
    border: 1px solid #f0a013;
    pointer-events: none;
  }

  /* ── Variante C: tab rettangolare più stretta, ancorata al bordo sinistro ── */
  .portrait-c {
    position: absolute;
    top: 18px;
    left: -26px;
    width: 92px;
    height: 118px;
    border: 3px solid #0d1420;
    background: #0d1420;
    box-shadow: 4px 4px 0 rgba(0, 0, 0, .45);
    z-index: 5;
  }

  .portrait-c img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    image-rendering: pixelated;
    display: block;
  }

  .portrait-c .ovr-badge {
    position: absolute;
    bottom: -3px;
    right: -3px;
    background: #f0a013;
    color: #0d1420;
    font-weight: 800;
    font-size: .72rem;
    padding: 2px 6px;
    border: 2px solid #0d1420;
    font-family: ui-monospace, Consolas, monospace;
  }
</style>

<div class="variant">
  <div class="variant-label">A — badge dritto, angolo HUD</div>
  <div class="card-wrap">
    <img class="card-bg" src="preview/playercard_current.png" alt="Scheda giocatore">
    <div class="portrait-a"><img src="preview/portrait_sample.png" alt="Ritratto"></div>
  </div>
</div>

<div class="variant">
  <div class="variant-label">B — card ruotata stile figurina</div>
  <div class="card-wrap">
    <img class="card-bg" src="preview/playercard_current.png" alt="Scheda giocatore">
    <div class="portrait-b"><img src="preview/portrait_sample.png" alt="Ritratto"></div>
  </div>
</div>

<div class="variant">
  <div class="variant-label">C — tab verticale con badge forza</div>
  <div class="card-wrap">
    <img class="card-bg" src="preview/playercard_current.png" alt="Scheda giocatore">
    <div class="portrait-c">
      <img src="preview/portrait_sample.png" alt="Ritratto">
      <span class="ovr-badge">78</span>
    </div>
  </div>
</div>
